version: 2

models:
  - name: gold_revenue_by_nation
    description: Total revenue aggregated by nation and region per year
    columns:
      - name: nation_name
        tests:
          - not_null
      - name: region_name
        tests:
          - not_null
      - name: order_year
        tests:
          - not_null
      - name: total_orders
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null
