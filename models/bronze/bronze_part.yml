version: 2

models:
  - name: bronze_part
    description: "Raw part data from TPCH_SF1 with renamed columns"
    columns:
      - name: part_key
        description: "Primary key for part"
        tests:
          - unique
          - not_null
      - name: part_name
        description: "Name of the part"
      - name: manufacturer
        description: "Manufacturer of the part"
      - name: brand
        description: "Brand of the part"
      - name: type
        description: "Type of the part"
      - name: size
        description: "Size of the part"
      - name: container
        description: "Container type for the part"
      - name: retail_price
        description: "Retail price of the part"
      - name: comment
        description: "Additional comments"
