version: 2

models:
  - name: silver_lineitem
    description: Line items enriched with order, part and supplier data
    columns:
      - name: order_key
        tests:
          - not_null
      - name: line_number
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
      - name: extended_price
        tests:
          - not_null
      - name: net_price
        tests:
          - not_null
      - name: ship_date
        tests:
          - not_null
      - name: part_name
        tests:
          - not_null
      - name: supplier_name
        tests:
          - not_null
