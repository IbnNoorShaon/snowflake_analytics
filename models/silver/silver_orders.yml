version: 2

models:
  - name: silver_orders
    description: Orders enriched with customer, nation and region data
    columns:
      - name: order_key
        description: Primary key
        tests:
          - unique
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: total_price
        tests:
          - not_null
      - name: customer_name
        tests:
          - not_null
      - name: nation_name
        tests:
          - not_null
      - name: region_name
